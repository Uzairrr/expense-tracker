<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #08080f;
      color: #e2e8f0;
      font-family: system-ui, sans-serif;
      min-height: 100vh;
      padding: 40px 16px;
    }

    .container { max-width: 760px; margin: 0 auto; }

    .header { margin-bottom: 24px; }
    .header p { color: #a78bfa; font-size: 11px; letter-spacing: 0.25em; font-family: monospace; margin-bottom: 8px; }
    .header h1 { color: #fff; font-size: 26px; font-weight: 700; }

    .summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 18px; }
    .summary-card { background: #0f0f1a; border: 1px solid #1a1a28; border-radius: 10px; padding: 16px; }
    .summary-card .label { color: #334155; font-size: 10px; letter-spacing: 0.1em; font-family: monospace; margin-bottom: 6px; }
    .summary-card .value { font-size: 20px; font-weight: 700; }

    .card { background: #0f0f1a; border: 1px solid #1a1a28; border-radius: 10px; padding: 18px 20px; margin-bottom: 16px; }
    .card-label { color: #334155; font-size: 10px; letter-spacing: 0.12em; font-family: monospace; margin-bottom: 14px; }

    .bar-row { margin-bottom: 10px; }
    .bar-top { display: flex; justify-content: space-between; margin-bottom: 4px; }
    .bar-top span { font-size: 12px; }
    .bar-top .cat { color: #64748b; }
    .bar-top .amt { color: #94a3b8; }
    .bar-track { height: 6px; background: #1a1a28; border-radius: 4px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 4px; transition: width 0.3s ease; }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr 80px; gap: 8px; }
    input, select {
      background: #13131a; border: 1px solid #2a2a3a; border-radius: 8px;
      padding: 9px 12px; color: #e2e8f0; font-size: 13px; outline: none;
      width: 100%; font-family: inherit;
    }
    input:focus, select:focus { border-color: #3a3a5a; }
    .btn-add {
      background: #7c3aed; color: #fff; border: none; border-radius: 8px;
      font-size: 13px; font-weight: 600; cursor: pointer; width: 100%;
    }
    .btn-add:hover { background: #6d28d9; }
    .form-error { color: #f87171; font-size: 12px; margin-top: 6px; }

    .filters { display: flex; gap: 6px; margin-bottom: 12px; }
    .filter-btn {
      background: none; border: 1px solid #1a1a28; color: #334155;
      border-radius: 6px; padding: 5px 14px; font-size: 12px; cursor: pointer;
      text-transform: capitalize; font-family: inherit;
    }
    .filter-btn.active { background: #1e1e2e; border-color: #3a3a5a; color: #e2e8f0; }

    .entry {
      background: #0f0f1a; border: 1px solid #1a1a28; border-radius: 8px;
      padding: 11px 14px; display: flex; align-items: center; gap: 10px; margin-bottom: 6px;
    }
    .entry-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .entry-info { flex: 1; min-width: 0; }
    .entry-info .name { color: #cbd5e1; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .entry-info .cat { color: #1e2030; font-size: 11px; }
    .entry-amount { font-size: 14px; font-weight: 600; flex-shrink: 0; }
    .entry-del { background: none; border: none; color: #1e2030; cursor: pointer; font-size: 16px; padding: 0; flex-shrink: 0; }
    .entry-del:hover { color: #475569; }

    .empty { color: #334155; font-size: 13px; text-align: center; padding: 24px 0; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <p>FINANCE TRACKER</p>
      <h1>Expense Tracker</h1>
    </div>

    <div class="summary">
      <div class="summary-card"><div class="label">BALANCE</div><div class="value" id="sumBalance"></div></div>
      <div class="summary-card"><div class="label">INCOME</div><div class="value" style="color:#22c55e" id="sumIncome"></div></div>
      <div class="summary-card"><div class="label">EXPENSES</div><div class="value" style="color:#f87171" id="sumExpense"></div></div>
    </div>

    <div class="card" id="chartCard" style="display:none">
      <div class="card-label">SPENDING BY CATEGORY</div>
      <div id="chart"></div>
    </div>

    <div class="card">
      <div class="card-label">ADD ENTRY</div>
      <div class="form-grid">
        <input type="text" id="fLabel" placeholder="Description" />
        <input type="number" id="fAmount" placeholder="Amount (£)" min="0" step="0.01" />
      </div>
      <div class="form-row">
        <select id="fType" onchange="syncCats()">
          <option value="expense">Expense</option>
          <option value="income">Income</option>
        </select>
        <select id="fCat"></select>
        <button class="btn-add" onclick="addEntry()">+ Add</button>
      </div>
      <div class="form-error" id="formError"></div>
    </div>

    <div class="filters">
      <button class="filter-btn active" data-f="all" onclick="setFilter('all')">all</button>
      <button class="filter-btn" data-f="income" onclick="setFilter('income')">income</button>
      <button class="filter-btn" data-f="expense" onclick="setFilter('expense')">expense</button>
    </div>

    <div id="list"></div>
  </div>

  <script>
    const EXP_CATS = ["Food","Transport","Housing","Entertainment","Health","Other"];
    const INC_CATS = ["Salary","Freelance","Investment","Gift","Other"];
    const CAT_COLORS = { Food:"#f59e0b",Transport:"#38bdf8",Housing:"#a78bfa",Entertainment:"#f472b6",Health:"#34d399",Other:"#64748b",Salary:"#22c55e",Freelance:"#06b6d4",Investment:"#8b5cf6",Gift:"#fb923c" };

    const SAMPLE = [
      { id:"e1", label:"Monthly salary",    amount:2400, type:"income",  category:"Salary" },
      { id:"e2", label:"Freelance project", amount:350,  type:"income",  category:"Freelance" },
      { id:"e3", label:"Rent",              amount:850,  type:"expense", category:"Housing" },
      { id:"e4", label:"Groceries",         amount:120,  type:"expense", category:"Food" },
      { id:"e5", label:"Netflix",           amount:15,   type:"expense", category:"Entertainment" },
      { id:"e6", label:"Bus pass",          amount:65,   type:"expense", category:"Transport" },
    ];

    function uid() { return Math.random().toString(36).slice(2,9); }
    function load() { try { return JSON.parse(localStorage.getItem("exp-entries")) || SAMPLE; } catch { return SAMPLE; } }
    function save() { localStorage.setItem("exp-entries", JSON.stringify(entries)); }

    let entries = load();
    let filter = "all";

    function syncCats() {
      const type = document.getElementById("fType").value;
      const cats = type === "income" ? INC_CATS : EXP_CATS;
      const sel = document.getElementById("fCat");
      sel.innerHTML = cats.map(c => `<option value="${c}">${c}</option>`).join("");
    }

    function addEntry() {
      const label = document.getElementById("fLabel").value.trim();
      const amount = parseFloat(document.getElementById("fAmount").value);
      const type = document.getElementById("fType").value;
      const category = document.getElementById("fCat").value;
      const errEl = document.getElementById("formError");

      if (!label) { errEl.textContent = "Enter a description."; return; }
      if (isNaN(amount) || amount <= 0) { errEl.textContent = "Enter a valid amount."; return; }
      errEl.textContent = "";

      entries.unshift({ id: uid(), label, amount, type, category });
      save(); render();
      document.getElementById("fLabel").value = "";
      document.getElementById("fAmount").value = "";
    }

    function deleteEntry(id) {
      entries = entries.filter(e => e.id !== id);
      save(); render();
    }

    function setFilter(f) {
      filter = f;
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.toggle("active", b.dataset.f === f));
      render();
    }

    function render() {
      const totalIncome  = entries.filter(e => e.type==="income").reduce((s,e)=>s+e.amount,0);
      const totalExpense = entries.filter(e => e.type==="expense").reduce((s,e)=>s+e.amount,0);
      const balance = totalIncome - totalExpense;

      const balEl = document.getElementById("sumBalance");
      balEl.textContent = "£" + Math.abs(balance).toFixed(2);
      balEl.style.color = balance >= 0 ? "#22c55e" : "#f87171";
      document.getElementById("sumIncome").textContent = "£" + totalIncome.toFixed(2);
      document.getElementById("sumExpense").textContent = "£" + totalExpense.toFixed(2);

      // Chart
      const catTotals = {};
      entries.filter(e => e.type==="expense").forEach(e => { catTotals[e.category] = (catTotals[e.category]||0) + e.amount; });
      const sorted = Object.entries(catTotals).sort((a,b)=>b[1]-a[1]);
      const maxVal = sorted[0]?.[1] || 1;
      const chartCard = document.getElementById("chartCard");
      if (sorted.length > 0) {
        chartCard.style.display = "block";
        document.getElementById("chart").innerHTML = sorted.map(([cat,total]) => `
          <div class="bar-row">
            <div class="bar-top"><span class="cat">${cat}</span><span class="amt">£${total.toFixed(2)}</span></div>
            <div class="bar-track"><div class="bar-fill" style="width:${(total/maxVal)*100}%;background:${CAT_COLORS[cat]||'#64748b'}"></div></div>
          </div>`).join("");
      } else {
        chartCard.style.display = "none";
      }

      // List
      const displayed = filter === "all" ? entries : entries.filter(e => e.type === filter);
      const list = document.getElementById("list");
      if (!displayed.length) { list.innerHTML = '<div class="empty">No entries yet</div>'; return; }
      list.innerHTML = displayed.map(e => `
        <div class="entry">
          <span class="entry-dot" style="background:${CAT_COLORS[e.category]||'#64748b'}"></span>
          <div class="entry-info">
            <div class="name">${e.label}</div>
            <div class="cat">${e.category}</div>
          </div>
          <span class="entry-amount" style="color:${e.type==='income'?'#22c55e':'#f87171'}">${e.type==='income'?'+':'−'}£${e.amount.toFixed(2)}</span>
          <button class="entry-del" onclick="deleteEntry('${e.id}')">×</button>
        </div>`).join("");
    }

    syncCats();
    render();
  </script>
</body>
</html>
