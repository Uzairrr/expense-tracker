<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="header">
      <p class="label">FINANCE TRACKER</p>
      <h1>Expense Tracker</h1>
    </div>

    <!-- Summary -->
    <div class="summary">
      <div class="summary-card">
        <div class="summary-label">BALANCE</div>
        <div class="summary-value" id="sumBalance"></div>
      </div>
      <div class="summary-card">
        <div class="summary-label">INCOME</div>
        <div class="summary-value income" id="sumIncome"></div>
      </div>
      <div class="summary-card">
        <div class="summary-label">EXPENSES</div>
        <div class="summary-value expense" id="sumExpense"></div>
      </div>
    </div>

    <!-- Category chart -->
    <div class="card" id="chartCard" hidden>
      <div class="card-label">SPENDING BY CATEGORY</div>
      <div id="chart"></div>
    </div>

    <!-- Add entry form -->
    <div class="card">
      <div class="card-label">ADD ENTRY</div>
      <div class="form-grid">
        <input type="text"   id="fLabel"  placeholder="Description" />
        <input type="number" id="fAmount" placeholder="Amount (£)" min="0" step="0.01" />
      </div>
      <div class="form-row">
        <select id="fType">
          <option value="expense">Expense</option>
          <option value="income">Income</option>
        </select>
        <select id="fCat"></select>
        <button class="btn-add" id="addBtn">+ Add</button>
      </div>
      <p class="form-error" id="formError"></p>
    </div>

    <!-- Filter tabs -->
    <div class="filters">
      <button class="filter-btn active" data-filter="all">all</button>
      <button class="filter-btn" data-filter="income">income</button>
      <button class="filter-btn" data-filter="expense">expense</button>
    </div>

    <!-- Entry list -->
    <div id="list"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
